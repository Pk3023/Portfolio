services:
  - type: web
    name: portfolio
    runtime: php
    plan: free
    buildCommand: composer install --no-dev --optimize-autoloader && php artisan storage:link && touch database/database.sqlite && php artisan key:generate --force && php artisan migrate --force && php artisan config:cache && php artisan route:cache && php artisan view:cache
    startCommand: vendor/bin/heroku-php-nginx public/
    healthCheckPath: /
    envVars:
      - key: APP_NAME
        value: Portfolio
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: LOG_CHANNEL
        value: single
      - key: CACHE_DRIVER
        value: file
      - key: SESSION_DRIVER
        value: file
      - key: QUEUE_CONNECTION
        value: sync
      - key: DB_CONNECTION
        value: sqlite
      - key: DB_DATABASE
        value: database/database.sqlite
